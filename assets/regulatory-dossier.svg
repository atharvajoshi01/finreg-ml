<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">finreg-ml Review File</title>
  <desc id="desc">A clean review file visual showing how finreg-ml turns model training into a reviewable evidence package.</desc>
  <defs>
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#203242" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="#E8EDF2"/>
  <rect x="64" y="42" width="1152" height="278" rx="22" fill="#FCFCFA" stroke="#CDD6E0" stroke-width="2" filter="url(#folderShadow)"/>
  <rect x="64" y="42" width="262" height="278" rx="22" fill="#102B40"/>
  <rect x="94" y="40" width="118" height="30" rx="8" fill="#3B6A90"/>

  <text x="96" y="98" fill="#BFD3E7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="2">REVIEW FILE</text>
  <text x="96" y="156" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="52" font-weight="700">finreg-ml</text>
  <text x="96" y="202" fill="#D5E2ED" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">Train the model.</text>
  <text x="96" y="232" fill="#D5E2ED" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">Keep the evidence.</text>

  <rect x="364" y="68" width="250" height="96" rx="16" fill="#F4F9FD" stroke="#D5E1EC" stroke-width="2"/>
  <text x="394" y="98" fill="#426988" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">STEP 01</text>
  <text x="394" y="134" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">Train</text>
  <text x="394" y="160" fill="#4B5A67" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">Wrap the estimator</text>

  <rect x="646" y="68" width="250" height="96" rx="16" fill="#F5FBF4" stroke="#D4E3D0" stroke-width="2"/>
  <text x="676" y="98" fill="#4F7B4F" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">STEP 02</text>
  <text x="676" y="134" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">Review</text>
  <text x="676" y="160" fill="#4B5A67" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">Check fairness and logs</text>

  <rect x="928" y="68" width="250" height="96" rx="16" fill="#FFF8EC" stroke="#E4D4B3" stroke-width="2"/>
  <text x="958" y="98" fill="#9A6C17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">STEP 03</text>
  <text x="958" y="134" fill="#17202A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">Report</text>
  <text x="958" y="160" fill="#4B5A67" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">Ship review artifacts</text>

  <path d="M614 116H646" stroke="#8FA8BD" stroke-width="6" stroke-linecap="round"/>
  <path d="M896 116H928" stroke="#8FA8BD" stroke-width="6" stroke-linecap="round"/>

  <rect x="364" y="196" width="814" height="92" rx="18" fill="#FAFBFC" stroke="#D8E1EB" stroke-width="2"/>
  <text x="394" y="228" fill="#426988" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">EVIDENCE PACKAGE</text>
  <rect x="394" y="244" width="178" height="30" rx="10" fill="#E6EFF7"/>
  <text x="416" y="264" fill="#32597E" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">model_card.json</text>
  <rect x="586" y="244" width="170" height="30" rx="10" fill="#E9F3EB"/>
  <text x="608" y="264" fill="#356243" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">audit_log.json</text>
  <rect x="770" y="244" width="200" height="30" rx="10" fill="#F8F0E3"/>
  <text x="792" y="264" fill="#7A5B1D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">compliance_report.json</text>
  <text x="394" y="296" fill="#51606D" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">Story: training is only the start.</text>
  <text x="394" y="320" fill="#51606D" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">finreg-ml keeps the review trail and the evidence package.</text>
</svg>
