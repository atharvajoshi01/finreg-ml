  <text x="72" y="144" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="700">Regulated ML Control Plane</text>
  <text x="72" y="186" fill="#B6F0E2" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="19">Explainability, fairness, auditability, and compliance-oriented artifacts for tabular ML.</text>

